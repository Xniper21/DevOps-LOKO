version: '3.8'

services:
  back-despachos:
    image: ${DOCKER_HUB_USER}/back-despachos:latest
    container_name: back-despachos-container
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      # Volúmen nombrado para persistir logs o datos críticos del negocio
      - datos_despachos:/app/data

  back-ventas:
    image: ${DOCKER_HUB_USER}/back-ventas:latest
    container_name: back-ventas-container
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - datos_ventas:/app/data

# Declaración formal de los volúmenes para que Docker los gestione de manera independiente
volumes:
  datos_despachos:
    driver: local
  datos_ventas:
    driver: local