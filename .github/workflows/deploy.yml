name: Deploy Frontend and Backend to AWS ECR/ECS

on:
  push:
    branches:
      - deploy-ecs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código en el Runner de GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Autenticarse en AWS Academy usando tus Secrets actuales
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # 3. Login en Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Compilar y subir la imagen del Backend a ECR
    - name: Build and Push Backend to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/innovatech/backend:latest ./proyecto-semestral-backend
        docker push $ECR_REGISTRY/innovatech/backend:latest

    # 5. Compilar y subir la imagen del Frontend a ECR
    - name: Build and Push Frontend to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/innovatech/frontend:latest ./proyecto-semestral-frontend
        docker push $ECR_REGISTRY/innovatech/frontend:latest

    # 6. Vincular las nuevas imágenes en el archivo task-definition.json
    - name: Render new images in ECS Task Definition
      id: render-task
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: backend-container
        image: ${{ steps.login-ecr.outputs.registry }}/innovatech/backend:latest

    - name: Render Frontend image in ECS Task Definition
      id: render-front
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.render-task.outputs.task-definition }}
        container-name: frontend-container
        image: ${{ steps.login-ecr.outputs.registry }}/innovatech/frontend:latest

    # 7. Desplegar los nuevos contenedores en el servicio ECS
    - name: Deploy to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-front.outputs.task-definition }}
        service: innovatech-stack-service
        cluster: innovatech-production-cluster
        wait-for-service-stability: true