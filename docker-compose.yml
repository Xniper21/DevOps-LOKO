version: '3.8'

services:
  back-despachos:
    image: ${DOCKER_HUB_USER}/back-despachos:latest
    container_name: back-despachos-container
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - proyecto-network
    volumes:
      - datos_despachos:/app/data

  back-ventas:
    image: ${DOCKER_HUB_USER}/back-ventas:latest
    container_name: back-ventas-container
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - proyecto-network
    volumes:
      - datos_ventas:/app/data

  front-despacho:
    image: ${DOCKER_HUB_USER}/front-despacho:latest
    container_name: front-despacho-container
    ports:
      - "80:80"
    depends_on:
      - back-despachos
      - back-ventas
    networks:
      - proyecto-network

networks:
  proyecto-network:
    driver: bridge

volumes:
  datos_despachos:
    driver: local
  datos_ventas:
    driver: local